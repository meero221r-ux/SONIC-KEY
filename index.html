<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONIC KEY - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SONIC KEY Welcome Abdullah</h1>
        
        <!-- واجهة اختيار المستويات -->
        <div id="level-selector" class="level-box">
            <button onclick="setLevel('A1')">A1 - Beginner</button>
            <button onclick="setLevel('B2')">B2 - Intermediate</button>
            <button onclick="setLevel('C2')">C2 - Advanced</button>
        </div>

        <!-- منطقة التمرين -->
        <div id="exercise-area" style="display: none;">
            <div id="timer" class="stat">0.00</div>
            <div class="controls">
                <label>Voice Speed: </label>
                <input type="range" id="speedRate" min="0.5" max="1.5" step="0.1" value="0.8">
            </div>

            <div id="text-display" class="text-area"></div>
            <div id="translation-display" class="translation-area"></div>
            <input type="text" id="user-input" autocomplete="off">
            <div id="message" class="message-box"></div>
            
            <button class="nav-btn" onclick="resetToLevels()">Change Level</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
